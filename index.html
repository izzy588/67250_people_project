<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MedConnect Chatbot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ffffff;
      margin: 0;
      padding: 40px 0;
      display: flex;
      justify-content: center;
    }

    #chat-container {
      width: 360px;
      height: 560px;
      background: white;
      border-radius: 14px;
      box-shadow: 0 4px 25px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 2px solid #0078d4;
    }

    #header {
      background: #0078d4;
      color: white;
      padding: 14px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
    }

    #messages {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      font-size: 14px;
    }

    #input-area {
      display: flex;
      border-top: 1px solid #ddd;
    }

    #input-area input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    #input-area button {
      background: #0078d4;
      color: white;
      border: none;
      padding: 12px 18px;
      cursor: pointer;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div id="chat-container">
  <div id="header">MedConnect Assistant</div>

  <div id="messages"></div>

  <div id="input-area">
    <input id="userInput" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  function sendMessage() {
    const input = document.getElementById("userInput");
    const messages = document.getElementById("messages");

    if (!input.value.trim()) return;

    const userMsg = document.createElement("div");
    userMsg.textContent = "You: " + input.value;
    messages.appendChild(userMsg);

    const botMsg = document.createElement("div");
    botMsg.textContent = "Bot: This is where your AI response will go.";
    messages.appendChild(botMsg);

    input.value = "";
    messages.scrollTop = messages.scrollHeight;
  }
</script>

</body>
</html>
