<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MedConnect Chatbot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    #chat-container {
      width: 350px;
      height: 550px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      margin: 40px auto;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
    }

    #input-area {
      display: flex;
      border-top: 1px solid #ddd;
    }

    #input-area input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
    }

    #input-area button {
      background: #0078d4;
      color: white;
      border: none;
      padding: 12px 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="chat-container">
  <div id="messages"></div>

  <div id="input-area">
    <input id="userInput" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  function sendMessage() {
    const input = document.getElementById("userInput");
    const messages = document.getElementById("messages");

    const userMsg = document.createElement("div");
    userMsg.textContent = "You: " + input.value;
    messages.appendChild(userMsg);

    // Placeholder bot response
    const botMsg = document.createElement("div");
    botMsg.textContent = "Bot: This is where your AI response will go.";
    messages.appendChild(botMsg);

    input.value = "";
    messages.scrollTop = messages.scrollHeight;
  }
</script>

</body>
</html>
